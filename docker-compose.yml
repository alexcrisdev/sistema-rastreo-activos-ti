services:
  db:
    image: postgres:16-alpine
    container_name: rastreo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rastreo_activos_diae
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rastreo_activos_diae"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rastreo_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Sistema de rastreo de activos TI
      APP_VERSION: 1.0.0
      DEBUG: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rastreo_activos_diae
      SECRET_KEY: clave-dev-cambiar-en-produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REGISTER_CODE: S1ST3M4S-MC-2026
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
      ADMIN_NOMBRES: Administrador
      ADMIN_APELLIDOS: Sistemas
      ADMIN_CORREO: admin@sistemas.com
      ADMIN_TELEFONO: "999999999"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./seed.py:/app/seed.py
    command: sh -c "alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rastreo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/activos
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts

volumes:
  postgres_data:
